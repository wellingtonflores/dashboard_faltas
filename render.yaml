services:
  - type: web
    name: faltas-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: faltas-redis
          property: connectionString
  - type: keyvalue
    name: faltas-redis
    ipAllowList: []
